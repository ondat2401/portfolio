<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="assets/media/favicon.svg">

  <!-- Meta Tags (updated by JS from config) -->
  <meta name="description" id="metaDesc" content="">
  <meta name="author" content="">

  <!-- Open Graph / Social Share -->
  <meta property="og:type" content="website">
  <meta property="og:title" id="ogTitle" content="">
  <meta property="og:description" id="ogDesc" content="">
  <meta property="og:image" id="ogImage" content="">
  <meta property="og:url" id="ogUrl" content="">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" id="twTitle" content="">
  <meta name="twitter:description" id="twDesc" content="">
  <meta name="twitter:image" id="twImage" content="">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>

  <!-- Retro Scanline Overlay -->
  <div class="scanline-overlay"></div>

  <!-- Particle Background -->
  <canvas id="particleCanvas"></canvas>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#" id="navBrand">Portfolio</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link active" href="#hero">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="#latestProjectSection">Highlights</a></li>
          <li class="nav-item"><a class="nav-link" href="#about">About</a></li>
          <!-- <li class="nav-item"><a class="nav-link" href="#skills">Skills</a></li> -->
          <li class="nav-item"><a class="nav-link" href="#projects">Projects</a></li>
          <li class="nav-item"><a class="nav-link" href="#experience">Experience</a></li>
          <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <section id="hero" class="hero-section d-flex align-items-center">
    <div class="container text-center text-white position-relative scroll-reveal scale-up" id="heroContent"></div>
  </section>

  <!-- Latest Project -->
  <section id="latestProjectSection" class="py-5">
    <div class="container">
      <h2 class="section-title text-center mb-5 scroll-reveal">Highlights</h2>
      <div id="latestProject" class="scroll-reveal"></div>
    </div>
  </section>

  <!-- About -->
  <section id="about" class="py-5">
    <div class="container">
      <h2 class="section-title text-center mb-5 scroll-reveal">About Me</h2>
      <div class="row align-items-center justify-content-center">
        <div class="col-lg-3 text-center mb-4 mb-lg-0 scroll-reveal">
          <div class="about-avatar mx-auto rounded-circle bg-secondary d-flex align-items-center justify-content-center" id="aboutAvatar">
            <i class="bi bi-person-fill text-white" style="font-size: 4rem;"></i>
          </div>
        </div>
        <div class="col-lg-7 scroll-reveal text-start" id="aboutText"></div>
      </div>
    </div>
  </section>

  <!-- Skills -->
  <section id="skills" class="py-5 bg-light">
    <div class="container">
      <h2 class="section-title text-center mb-5 scroll-reveal">Skills</h2>
      <div class="row g-4 scroll-reveal-children" id="skillsSection"></div>
    </div>
  </section>

  <!-- Projects -->
  <section id="projects" class="py-5">
    <div class="container">
      <h2 class="section-title text-center mb-5 scroll-reveal">Projects</h2>
      <div id="projectCategories" class="scroll-reveal"></div>
    </div>
  </section>

  <!-- Timeline -->
  <section id="experience" class="py-5 bg-light">
    <div class="container">
      <h2 class="section-title text-center mb-5 scroll-reveal">Experience</h2>
      <div class="timeline" id="timelineContent"></div>
    </div>
  </section>

  <!-- Contact -->
  <section id="contact" class="py-5 bg-light">
    <div class="container">
      <h2 class="section-title text-center mb-5 scroll-reveal">Contact</h2>
      <div class="row justify-content-center">
        <div class="col-lg-6 scroll-reveal scale-up">
          <form id="contactForm" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
            <div class="mb-3">
              <label for="name" class="form-label">Name</label>
              <input type="text" class="form-control" id="name" name="name" required>
            </div>
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input type="email" class="form-control" id="email" name="email" required>
            </div>
            <div class="mb-3">
              <label for="message" class="form-label">Message</label>
              <textarea class="form-control" id="message" name="message" rows="5" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary w-100">Send Message</button>
          </form>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="bg-dark text-white py-4">
    <div class="container text-center" id="footerContent"></div>
  </footer>

  <!-- Project Detail Modal -->
  <div class="modal fade" id="projectModal" tabindex="-1" aria-labelledby="projectModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="projectModalLabel"></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body" id="projectModalBody"></div>
      </div>
    </div>
  </div>

  <!-- Playable Fullscreen Modal -->
  <div class="playable-overlay" id="playableOverlay">
    <div class="playable-header">
      <span class="playable-title" id="playableTitle"></span>
      <div class="playable-header-actions">
        <button class="playable-btn playable-ratio-btn active" id="btnRatio916" aria-label="9:16">9:16</button>
        <button class="playable-btn playable-ratio-btn" id="btnRatio169" aria-label="16:9">16:9</button>
        <button class="playable-btn" id="btnPlayableReload" aria-label="Reload">Reload</button>
        <button class="playable-btn playable-btn--danger" id="playableCloseBtn" aria-label="Close playable">Close</button>
      </div>
    </div>
    <div class="playable-body">
      <div class="playable-container" id="playableContainer" data-ratio="9:16">
        <iframe id="playableFrame" class="playable-frame" sandbox="allow-scripts allow-same-origin allow-popups"></iframe>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
